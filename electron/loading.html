<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #1e1e1e; color: #cccccc;
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; user-select: none;
    }
    .logo { font-size: 56px; animation: sway 3s ease-in-out infinite; }
    h1 { font-weight: 300; letter-spacing: 1px; margin: 0; }
    #status { color: #858585; font-size: 13px; max-width: 340px; text-align: center; min-height: 18px; }
    .bar-track { width: 280px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; margin-top: 4px; }
    #bar { height: 100%; width: 0%; background: #0e639c; border-radius: 2px; transition: width 0.3s ease; }
    .bar-track.indeterminate #bar {
      width: 40%; animation: slide 1.4s ease-in-out infinite;
    }
    #pct { color: #555; font-size: 11px; min-height: 14px; }
    #error { color: #f48771; font-size: 12px; max-width: 340px; text-align: center; display: none; }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    @keyframes sway { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }
  </style>
</head>
<body>
  <div class="logo">🌳</div>
  <h1>BonsAI IDE</h1>
  <div id="status">Initialising…</div>
  <div class="bar-track indeterminate" id="track"><div id="bar"></div></div>
  <div id="pct"></div>
  <div id="error"></div>
  <script>
    window.setStatus = (msg) => { document.getElementById('status').textContent = msg; };
    window.setProgress = (pct) => {
      const track = document.getElementById('track');
      const bar = document.getElementById('bar');
      const pctEl = document.getElementById('pct');
      if (pct < 0) {
        track.classList.add('indeterminate');
        bar.style.width = '0%';
        pctEl.textContent = '';
      } else {
        track.classList.remove('indeterminate');
        bar.style.width = pct + '%';
        pctEl.textContent = pct + '%';
      }
    };
    window.setError = (msg) => {
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = msg;
      document.getElementById('track').style.display = 'none';
    };
  </script>
</body>
</html>
